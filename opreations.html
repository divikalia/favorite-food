<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2>Subtraction➖</h2>
 <input id="num1" type="number">
    <input id="num2" type="number">
    <button onclick="sub()">
      click me
    </button>
    <p id="SUB result">
    </p>
    <script>
      function sub(){
    let x = Number(document.getElementById("num1").value);
    let y = Number(document.getElementById("num2").value);
    let diff= x-y;
    document.getElementById("SUB result").innerText="answer="+diff;
      }
    </script>
<h2>Addition➕</h2>
    <input id="num3" type="number">
<input id="num4" type="number">
<input id="num5" type="number">
<button onclick="add()">
  enter
</button>
<p id="ADD result">
  </p>
<script>
  function add(){
    let x = Number(document.getElementById("num3").value);
let y = Number(document.getElementById("num4").value);
let z = Number(document.getElementById("num5").value);
let sum= x+y+z;
 document.getElementById("ADD result").innerText="answer="+sum;
  }
    </script>
    
    <h2>Multiplication✖️</h2>

<input id="num6" type="number">
<input id="num7" type="number">
<input id="num8" type="number">  
<button onclick="multiply()">
  press here
</button>
<p id="MULTIPLY result">
  </p>
<script>
   function multiply() {
    let x = Number(document.getElementById("num6").value);
let y = Number(document.getElementById("num7").value);
let z = Number(document.getElementById("num8").value);
let product= x*y*z;
document.getElementById("MULTIPLY result").innerText="answer="+product;
  }

</script>



</body> 
</html>

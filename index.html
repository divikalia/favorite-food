<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
</style>
</head>

<body>

<h2>Subtraction➖</h2>
<input id="num1" type="number">
<input id="num2" type="number">
<button onclick="sub()">Subtract</button>
<p id="subResult"></p>

<h2>Addition➕</h2>
<input id="num3" type="number">
<input id="num4" type="number">
<input id="num5" type="number">
<button onclick="add()">Add</button>
<p id="addResult"></p>

<h2>Multiplication✖️</h2>
<input id="num6" type="number">
<input id="num7" type="number">
<input id="num8" type="number">
<button onclick="multiply()">Multiply</button>
<p id="multiplyResult"></p>

<script>
function sub(){
  let x = Number(num1.value);
  let y = Number(num2.value);
  subResult.innerText = "answer=" + (x - y);
}

function add(){
  let x = Number(num3.value);
  let y = Number(num4.value);
  let z = Number(num5.value);
  addResult.innerText = "answer=" + (x + y + z);
}

function multiply(){
  let x = Number(num6.value);
  let y = Number(num7.value);
  let z = Number(num8.value);
  multiplyResult.innerText = "answer=" + (x * y * z);
}
</script>
